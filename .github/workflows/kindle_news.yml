name: Enviar Periodico Kindle

on:
  schedule:
    # Se ejecuta todos los días a las 11:00 UTC (05:00 AM hora de CDMX)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite activar el envío manual

jobs:
  enviar_noticias:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        pip install feedparser

    - name: Ejecutar script de noticias
      env:
        EMAIL_EMISOR: ${{ secrets.EMAIL_EMISOR }}
        PASSWORD_EMISOR: ${{ secrets.PASSWORD_EMISOR }}
        EMAIL_KINDLE: ${{ secrets.EMAIL_KINDLE }}
      run: python kindle_news.py
